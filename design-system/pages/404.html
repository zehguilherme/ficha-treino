<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficha de Treino — Página não encontrada</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: 210 40% 98%;
      --foreground: 222.2 84% 4.9%;
      --card: 0 0% 100%;
      --card-foreground: 222.2 84% 4.9%;
      --primary: 222.2 47.4% 11.2%;
      --primary-foreground: 210 40% 98%;
      --secondary: 210 40% 96.1%;
      --secondary-foreground: 222.2 47.4% 11.2%;
      --muted: 210 40% 96.1%;
      --muted-foreground: 215.4 16.3% 46.9%;
      --accent: 210 40% 96.1%;
      --accent-foreground: 222.2 47.4% 11.2%;
      --border: 214.3 31.8% 91.4%;
      --ring: 222.2 84% 4.9%;
      --radius: 0.5rem;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: hsl(var(--card));
      border-bottom: 1px solid hsl(var(--border));
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .header-inner {
      max-width: 80rem;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 3.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header-logo {
      width: 1.75rem;
      height: 1.75rem;
      background: hsl(var(--foreground));
      border-radius: 0.375rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-logo svg {
      width: 0.875rem;
      height: 0.875rem;
      color: hsl(var(--background));
    }

    .header-title {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .card {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: calc(var(--radius) + 0.25rem);
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 26rem;
      width: 100%;
    }

    .code {
      font-size: 5rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      color: hsl(var(--foreground));
      margin-bottom: 0.5rem;
    }

    .code-dots {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .code-dot {
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 9999px;
      background: hsl(var(--muted-foreground) / 0.3);
    }

    .message {
      font-size: 1.125rem;
      font-weight: 500;
      line-height: 1.5;
      margin-bottom: 0.75rem;
    }

    .sub-message {
      font-size: 0.875rem;
      color: hsl(var(--muted-foreground));
      line-height: 1.5;
      margin-bottom: 2rem;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: hsl(var(--foreground));
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      padding: 0.5rem 1.25rem;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
    }

    .btn-home:hover {
      background: hsl(var(--secondary));
    }

    .btn-home svg {
      width: 0.875rem;
      height: 0.875rem;
    }

    .footer {
      border-top: 1px solid hsl(var(--border));
      padding: 2rem 1.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: hsl(var(--muted-foreground));
    }

    @media (max-width: 640px) {
      .main { padding: 2rem 1rem; }
      .card { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="header-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6.5 6.5 17.5 17.5" />
          <path d="M17.5 6.5 6.5 17.5" />
          <circle cx="12" cy="5" r="1" />
          <circle cx="12" cy="19" r="1" />
          <circle cx="5" cy="12" r="1" />
          <circle cx="19" cy="12" r="1" />
        </svg>
      </div>
      <span class="header-title">Ficha de Treino</span>
    </div>
  </header>

  <main class="main">
    <div class="card">
      <div class="code">404</div>
      <p class="message">Esse exercício não existe na sua ficha</p>
      <p class="sub-message">
        Parece que você tentou pegar um haltere que não está no rack. 
        Respira, volta pro início e tenta de novo.
      </p>
      <a href="landing.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        Voltar para Home
      </a>
    </div>
  </main>

  <footer class="footer">
    Ficha de Treino &mdash; Seu treino organizado
  </footer>
</body>
</html>
