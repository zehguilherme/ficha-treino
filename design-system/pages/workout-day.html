<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficha de Treino - Segunda-feira</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: 210 40% 98%;
      --foreground: 222.2 84% 4.9%;
      --card: 0 0% 100%;
      --card-foreground: 222.2 84% 4.9%;
      --primary: 222.2 47.4% 11.2%;
      --primary-foreground: 210 40% 98%;
      --secondary: 210 40% 96.1%;
      --secondary-foreground: 222.2 47.4% 11.2%;
      --muted: 210 40% 96.1%;
      --muted-foreground: 215.4 16.3% 46.9%;
      --accent: 210 40% 96.1%;
      --accent-foreground: 222.2 47.4% 11.2%;
      --destructive: 0 84.2% 60.2%;
      --destructive-foreground: 210 40% 98%;
      --border: 214.3 31.8% 91.4%;
      --ring: 222.2 84% 4.9%;
      --radius: 0.5rem;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      min-height: 100vh;
    }

    .header {
      background: hsl(var(--card));
      border-bottom: 1px solid hsl(var(--border));
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .header-inner {
      max-width: 80rem;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 3.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      border-radius: var(--radius);
      border: 1px solid hsl(var(--border));
      background: hsl(var(--card));
      cursor: pointer;
      color: hsl(var(--foreground));
      transition: background 0.1s;
      flex-shrink: 0;
    }

    .btn-back:hover {
      background: hsl(var(--secondary));
    }

    .btn-back svg {
      width: 1rem;
      height: 1rem;
    }

    .header-title {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      flex: 1;
    }

    .header-counter {
      font-size: 0.75rem;
      font-weight: 500;
      color: hsl(var(--muted-foreground));
      background: hsl(var(--secondary));
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .container {
      max-width: 56rem;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .day-section {
      margin-bottom: 2rem;
    }

    .day-section-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .day-name-large {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .btn-clear {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: hsl(var(--muted-foreground));
      background: none;
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      padding: 0.375rem 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-clear:hover {
      color: hsl(var(--destructive));
      border-color: hsl(var(--destructive) / 0.3);
    }

    .btn-clear svg {
      width: 0.875rem;
      height: 0.875rem;
    }

    .search-box {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .search-box svg {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      width: 1rem;
      height: 1rem;
      color: hsl(var(--muted-foreground));
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 0.625rem 0.75rem 0.625rem 2.25rem;
      font-size: 0.875rem;
      font-family: 'Inter', system-ui, sans-serif;
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      color: hsl(var(--foreground));
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input:focus {
      border-color: hsl(var(--ring));
      box-shadow: 0 0 0 2px hsl(var(--ring) / 0.1);
    }

    .search-input::placeholder {
      color: hsl(var(--muted-foreground));
    }

    .exercise-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .exercise-card {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: calc(var(--radius) + 0.125rem);
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .exercise-card:hover {
      border-color: hsl(var(--ring) / 0.12);
    }

    .exercise-card-body {
      padding: 1.25rem;
    }

    .exercise-carousel {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: hsl(var(--secondary));
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 1rem;
      border: 1px solid hsl(var(--border));
    }

    .carousel-viewport {
      height: 100%;
      overflow: hidden;
    }

    .carousel-track {
      display: flex;
      height: 100%;
      scroll-snap-type: x mandatory;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      scroll-behavior: smooth;
    }

    .carousel-track::-webkit-scrollbar {
      display: none;
    }

    .carousel-item {
      flex: 0 0 100%;
      scroll-snap-align: start;
      min-width: 0;
      height: 100%;
    }

    .carousel-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .carousel-item .placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: hsl(var(--secondary));
      color: hsl(var(--muted-foreground));
      font-size: 0.75rem;
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 2rem;
      height: 2rem;
      border-radius: 9999px;
      background: hsl(var(--card) / 0.85);
      border: 1px solid hsl(var(--border));
      color: hsl(var(--foreground));
      font-size: 1.125rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s;
      z-index: 2;
      backdrop-filter: blur(4px);
    }

    .exercise-carousel:hover .carousel-btn {
      opacity: 1;
    }

    .carousel-btn:hover {
      background: hsl(var(--card));
    }

    .carousel-btn:disabled {
      opacity: 0 !important;
      cursor: default;
    }

    .carousel-prev { left: 0.5rem; }
    .carousel-next { right: 0.5rem; }

    .carousel-footer {
      position: absolute;
      bottom: 0.625rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0.625rem;
      background: hsl(var(--foreground) / 0.45);
      padding: 0.25rem 0.625rem;
      border-radius: 9999px;
      backdrop-filter: blur(4px);
      white-space: nowrap;
    }

    .carousel-dots {
      display: flex;
      gap: 0.375rem;
    }

    .carousel-dot {
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 50%;
      background: hsl(var(--background) / 0.5);
      border: none;
      cursor: pointer;
      padding: 0;
      transition: background 0.15s;
    }

    .carousel-dot.active {
      background: hsl(var(--background));
    }

    .carousel-counter {
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: hsl(var(--background));
      user-select: none;
    }

    .exercise-info {
      flex: 1;
      min-width: 0;
    }

    .exercise-name {
      font-size: 0.9375rem;
      font-weight: 600;
      margin-bottom: 0.375rem;
    }

    .exercise-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      margin-bottom: 0.5rem;
    }

    .tag {
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: hsl(var(--muted-foreground));
      background: hsl(var(--secondary));
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      text-transform: uppercase;
    }

    .exercise-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      font-size: 0.75rem;
      color: hsl(var(--muted-foreground));
    }

    .exercise-meta .muscle-group {
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
    }

    .exercise-meta .muscle-label {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: hsl(var(--muted-foreground));
    }

    .exercise-meta .muscle-label svg {
      width: 0.75rem;
      height: 0.75rem;
    }

    .exercise-meta .muscle-name {
      font-size: 0.75rem;
      color: hsl(var(--foreground));
      padding-left: 1rem;
    }

    .exercise-meta svg {
      width: 0.75rem;
      height: 0.75rem;
    }

    .exercise-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid hsl(var(--border));
    }

    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8125rem;
      color: hsl(var(--muted-foreground));
      cursor: pointer;
      user-select: none;
    }

    .checkbox-wrap input[type="checkbox"] {
      appearance: none;
      width: 1rem;
      height: 1rem;
      border: 1.5px solid hsl(var(--border));
      border-radius: 0.25rem;
      background: hsl(var(--card));
      cursor: pointer;
      transition: all 0.12s;
      flex-shrink: 0;
    }

    .checkbox-wrap input[type="checkbox"]:checked {
      background: hsl(var(--foreground));
      border-color: hsl(var(--foreground));
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3E%3C/svg%3E");
      background-size: 0.75rem;
      background-position: center;
      background-repeat: no-repeat;
    }

    .btn-remove-exercise {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: white;
      background: hsl(var(--destructive));
      border: none;
      border-radius: var(--radius);
      padding: 0.375rem 0.75rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-remove-exercise:hover {
      background: hsl(var(--destructive) / 0.9);
    }

    .btn-remove-exercise svg {
      width: 0.875rem;
      height: 0.875rem;
    }

    .btn-add-exercise {
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: hsl(var(--primary-foreground));
      background: hsl(var(--foreground));
      border: none;
      border-radius: var(--radius);
      padding: 0.375rem 0.75rem;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.1s;
    }

    .btn-add-exercise:hover {
      opacity: 0.85;
    }

    .instructions-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: hsl(var(--muted-foreground));
      background: none;
      border: 1px solid hsl(var(--border));
      border-radius: 0.375rem;
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      transition: background 0.15s;
    }

    .instructions-toggle:hover {
      background: hsl(var(--secondary));
    }

    .instructions-toggle .toggle-icon {
      transition: transform 0.2s;
    }

    .exercise-actions:has(+ .instructions-text.open) .instructions-toggle .toggle-icon {
      transform: rotate(180deg);
    }

    .instructions-text {
      font-size: 0.8125rem;
      color: hsl(var(--muted-foreground));
      line-height: 1.6;
      margin-top: 0.75rem;
      padding: 0.75rem;
      background: hsl(var(--secondary));
      border-radius: var(--radius);
      display: none;
    }

    .instructions-text.open {
      display: block;
    }

    .search-results {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid hsl(var(--border));
    }

    .search-results-title {
      font-size: 0.8125rem;
      font-weight: 500;
      color: hsl(var(--muted-foreground));
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.75rem;
    }

    .search-result-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.625rem 0;
      border-bottom: 1px solid hsl(var(--border));
    }

    .search-result-item:last-child {
      border-bottom: none;
    }

    .search-result-name {
      font-size: 0.875rem;
      font-weight: 500;
    }

    .search-result-category {
      font-size: 0.6875rem;
      color: hsl(var(--muted-foreground));
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .empty-workout {
      text-align: center;
      padding: 3rem 1.5rem;
      color: hsl(var(--muted-foreground));
    }

    .empty-workout svg {
      width: 2.5rem;
      height: 2.5rem;
      margin: 0 auto 0.75rem;
      opacity: 0.4;
    }

    .empty-workout p {
      font-size: 0.875rem;
      line-height: 1.5;
    }

    @media (max-width: 640px) {
      .container { padding: 1.5rem 1rem; }
      .exercise-carousel { aspect-ratio: 4 / 3; }
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <button class="btn-back" onclick="window.location.href='dashboard.html'" aria-label="Voltar" data-od-id="btn-voltar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5" />
          <path d="M12 19l-7-7 7-7" />
        </svg>
      </button>
      <span class="header-title" id="pageDayName">Segunda-feira</span>
      <span class="header-counter" id="headerCounter">0 / 0</span>
    </div>
  </header>

  <main class="container">
    <div class="day-section">
      <div class="day-section-top">
        <h1 class="day-name-large" id="dayName">Segunda-feira</h1>
        <button class="btn-clear" id="btnClear" data-od-id="btn-limpar-treino"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 22-1-4"/><path d="M19 14a1 1 0 0 0 1-1v-1a2 2 0 0 0-2-2h-3a1 1 0 0 1-1-1V4a2 2 0 0 0-4 0v5a1 1 0 0 1-1 1H6a2 2 0 0 0-2 2v1a1 1 0 0 0 1 1"/><path d="M19 14H5l-1.973 6.767A1 1 0 0 0 4 22h16a1 1 0 0 0 .973-1.233z"/><path d="m8 22 1-4"/></svg>Limpar treino</button>
      </div>

      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <path d="M21 21l-4.35-4.35" />
        </svg>
        <input
          class="search-input"
          type="text"
          id="searchInput"
          placeholder="Buscar exercícios para adicionar..."
          data-od-id="input-busca-exercicios"
        >
      </div>

      <div id="searchResults" class="search-results hidden">
        <div class="search-results-title">Resultados da busca</div>
        <div id="resultsList"></div>
      </div>

      <div id="currentExercises" class="exercise-list"></div>

      <div id="emptyState" class="empty-workout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6.5 6.5 17.5 17.5" />
          <path d="M17.5 6.5 6.5 17.5" />
          <circle cx="12" cy="5" r="1" />
          <circle cx="12" cy="19" r="1" />
          <circle cx="5" cy="12" r="1" />
          <circle cx="19" cy="12" r="1" />
        </svg>
        <p>Nenhum exercício neste treino.<br>Use a busca acima para adicionar exercícios.</p>
      </div>
    </div>
  </main>

  <script>
    const days = ['domingo', 'segunda', 'terca', 'quarta', 'quinta', 'sexta', 'sabado'];
    const dayNames = {
      domingo: 'Domingo', segunda: 'Segunda-feira', terca: 'Terça-feira',
      quarta: 'Quarta-feira', quinta: 'Quinta-feira', sexta: 'Sexta-feira',
      sabado: 'Sábado'
    };

    const exercisesDB = [
      { id: 'supino_reto', name: 'Supino reto com barra', category: 'força', equipment: 'Barra', primary: 'Peitoral maior', secondary: 'Tríceps, Ombro anterior', instructions: ['Deite-se no banco reto.', 'Segure a barra com as mãos na largura dos ombros.', 'Abaixe a barra até o peito.', 'Empurre a barra para cima até a extensão completa.'] },
      { id: 'crucifixo_inclinado', name: 'Crucifixo inclinado', category: 'força', equipment: 'Halteres', primary: 'Peitoral maior (porção superior)', secondary: 'Ombro anterior', instructions: ['Ajuste o banco em 45 graus.', 'Segure os halteres com palmas voltadas uma para a outra.', 'Abra os braços em arco.', 'Retorne à posição inicial.'] },

      { id: 'elevacao_lateral', name: 'Elevação lateral', category: 'força', equipment: 'Halteres', primary: 'Ombro lateral', secondary: 'Trapézio', instructions: ['Em pé, halteres ao lado do corpo.', 'Eleve os braços lateralmente até a altura dos ombros.', 'Abaixe lentamente.'] },

      { id: 'remada_curvada', name: 'Remada curvada', category: 'força', equipment: 'Barra', primary: 'Latíssimo do dorso', secondary: 'Romboides, Bíceps', instructions: ['Em pé, tronco inclinado 45 graus.', 'Segure a barra com as mãos na largura dos ombros.', 'Puxe a barra em direção ao abdômen.', 'Estenda os braços.'] },
      { id: 'rosca_direta', name: 'Rosca direta', category: 'força', equipment: 'Barra W', primary: 'Bíceps braquial', secondary: 'Braquial', instructions: ['Em pé, segure a barra com palmas para cima.', 'Flexione os cotovelos levando a barra aos ombros.', 'Abaixe lentamente.'] },
      { id: 'agachamento_livre', name: 'Agachamento livre', category: 'força', equipment: 'Barra', primary: 'Quadríceps', secondary: 'Glúteos, Posterior da coxa', instructions: ['Posicione a barra nas costas.', 'Flexione os joelhos até 90 graus.', 'Estenda as pernas para voltar.'] },
      { id: 'cadeira_extensora', name: 'Cadeira extensora', category: 'força', equipment: 'Máquina', primary: 'Quadríceps', secondary: 'Nenhum', instructions: ['Sente-se na máquina.', 'Ajuste o apoio para os tornozelos.', 'Estenda as pernas completamente.', 'Abaixe lentamente.'] },
      { id: 'crucifixo_reto', name: 'Crucifixo reto', category: 'força', equipment: 'Halteres', primary: 'Peitoral maior', secondary: 'Ombro anterior', instructions: ['Deite-se em um banco reto.', 'Segure halteres com palmas voltadas uma para a outra.', 'Abra os braços em arco.', 'Retorne à posição inicial.'] },
      { id: 'triceps_corda', name: 'Tríceps corda', category: 'força', equipment: 'Polia alta', primary: 'Tríceps braquial', secondary: 'Nenhum', instructions: ['Segure a corda na polia alta.', 'Mantenha os cotovelos fixos ao lado do corpo.', 'Empurre a corda para baixo.', 'Retorne lentamente.'] },
      { id: 'cadeira_flexora', name: 'Cadeira flexora', category: 'força', equipment: 'Máquina', primary: 'Posterior da coxa', secondary: 'Glúteos', instructions: ['Deite-se de bruços na máquina.', 'Prenda os tornozelos no apoio.', 'Flexione os joelhos.', 'Abaixe lentamente.'] },
      { id: 'leg_press', name: 'Leg press', category: 'força', equipment: 'Máquina', primary: 'Quadríceps', secondary: 'Glúteos, Posterior da coxa', instructions: ['Sente-se na máquina.', 'Posicione os pés na plataforma.', 'Empurre a plataforma estendendo as pernas.', 'Flexione os joelhos lentamente.'] },
      { id: 'puxada_triceps', name: 'Puxada de tríceps', category: 'força', equipment: 'Polia alta', primary: 'Tríceps braquial', secondary: 'Nenhum', instructions: ['Segure a barra reta na polia alta.', 'Cotovelos fixos ao lado do corpo.', 'Empurre a barra para baixo.', 'Retorne lentamente.'] },
      { id: 'elevacao_joelhos', name: 'Elevação de joelhos', category: 'força', equipment: 'Barra fixa', primary: 'Abdômen', secondary: 'Flexores do quadril', instructions: ['Pendure-se na barra fixa.', 'Eleve os joelhos em direção ao peito.', 'Abaixe lentamente.'] },
    ];

    const defaultExercises = {
      segunda: ['supino_reto', 'crucifixo_inclinado', 'desenvolvimento_halteres', 'elevacao_lateral'],
      terca: ['puxada_frontal', 'remada_curvada', 'rosca_direta'],
      quarta: ['agachamento_livre', 'cadeira_extensora'],
      sexta: ['crucifixo_reto', 'elevacao_lateral', 'triceps_corda'],
      sabado: ['cadeira_flexora'],
    };

    const params = new URLSearchParams(window.location.search);
    const day = params.get('day') || 'segunda';
    const dayDisplay = dayNames[day] || 'Segunda-feira';
    document.getElementById('pageDayName').textContent = dayDisplay;
    document.getElementById('dayName').textContent = dayDisplay;

    let doneState = {};
    let currentIds = [...(defaultExercises[day] || [])];
    let searchTimer = null;

    function getExercise(id) {
      return exercisesDB.find(e => e.id === id);
    }

    function renderExercises() {
      const container = document.getElementById('currentExercises');
      const empty = document.getElementById('emptyState');
      const searchEl = document.getElementById('searchResults');

      if (currentIds.length === 0) {
        container.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }

      empty.classList.add('hidden');

      const sorted = [...currentIds].sort((a, b) => {
        const ea = getExercise(a);
        const eb = getExercise(b);
        return (ea ? ea.name : a).localeCompare(eb ? eb.name : b);
      });

      container.innerHTML = sorted.map(id => {
        const ex = getExercise(id);
        if (!ex) return '';
        const done = doneState[id] || false;

        const imgs = [0, 1];

        return `
          <div class="exercise-card" data-exercise-id="${id}">
            <div class="exercise-card-body">
              <div class="exercise-carousel" data-carousel-id="${id}">
                <div class="carousel-viewport">
                  <div class="carousel-track" id="track-${id}">
                    ${imgs.map(i => `
                    <div class="carousel-item">
                      <img src="https://cdn.jsdelivr.net/gh/yuhonas/free-exercise-db@main/exercises/${id}/${i}.jpg" alt="${ex.name}" loading="lazy" onerror="this.onerror=null;this.outerHTML='<div class=placeholder>Imagem indisponível</div>'">
                    </div>
                    `).join('')}
                  </div>
                </div>
                <button class="carousel-btn carousel-prev" onclick="scrollCarousel('${id}', -1)" data-od-id="prev-${id}">‹</button>
                <button class="carousel-btn carousel-next" onclick="scrollCarousel('${id}', 1)" data-od-id="next-${id}">›</button>
                <div class="carousel-footer">
                  <div class="carousel-dots" id="dots-${id}">
                    ${imgs.map(i => `<button class="carousel-dot${i === 0 ? ' active' : ''}" onclick="scrollToCarousel('${id}', ${i})" data-od-id="dot-${id}-${i}"></button>`).join('')}
                  </div>
                  <span class="carousel-counter" id="counter-${id}">1 / ${imgs.length}</span>
                </div>
              </div>
              <div class="exercise-info">
                <div class="exercise-name">${ex.name}</div>
                <div class="exercise-tags">
                  <span class="tag">${ex.category}</span>
                  <span class="tag">${ex.equipment}</span>
                </div>
                <div class="exercise-meta">
                  <div class="muscle-group">
                    <span class="muscle-label">
                      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.409 13.017A5 5 0 0 1 22 15c0 3.866-4 7-9 7-4.077 0-8.153-.82-10.371-2.462-.426-.316-.631-.832-.62-1.362C2.118 12.723 2.627 2 10 2a3 3 0 0 1 3 3 2 2 0 0 1-2 2c-1.105 0-1.64-.444-2-1"/><path d="M15 14a5 5 0 0 0-7.584 2"/><path d="M9.964 6.825C8.019 7.977 9.5 13 8 15"/></svg>
                      Músculo Primário
                    </span>
                    <span class="muscle-name">${ex.primary}</span>
                  </div>
                  ${ex.secondary && ex.secondary !== 'Nenhum' ? `
                  <div class="muscle-group">
                    <span class="muscle-label">
                      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.409 13.017A5 5 0 0 1 22 15c0 3.866-4 7-9 7-4.077 0-8.153-.82-10.371-2.462-.426-.316-.631-.832-.62-1.362C2.118 12.723 2.627 2 10 2a3 3 0 0 1 3 3 2 2 0 0 1-2 2c-1.105 0-1.64-.444-2-1"/><path d="M15 14a5 5 0 0 0-7.584 2"/><path d="M9.964 6.825C8.019 7.977 9.5 13 8 15"/></svg>
                      Músculo Secundário
                    </span>
                    <span class="muscle-name">${ex.secondary}</span>
                  </div>` : ''}
                </div>
              </div>
              <div class="exercise-actions">
                <label class="checkbox-wrap">
                  <input type="checkbox" ${done ? 'checked' : ''} onchange="toggleDone('${id}')" data-od-id="check-feito-${id}">
                  Feito
                </label>
                <button class="instructions-toggle" onclick="toggleInstructions('${id}')" data-od-id="btn-instrucoes-${id}">Instruções<svg class="toggle-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>
                <button class="btn-remove-exercise" onclick="removeExercise('${id}')" data-od-id="btn-remover-${id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/></svg>Remover</button>
              </div>
              <div class="instructions-text" id="instr-${id}">
                ${ex.instructions.map(i => `<p style="margin-bottom:0.375rem">&bull; ${i}</p>`).join('')}
              </div>
            </div>
          </div>
        `;
      }).join('');
      updateHeaderCounter();
      initCarousels();
    }

    function updateHeaderCounter() {
      const total = currentIds.length;
      const done = currentIds.filter(id => doneState[id]).length;
      document.getElementById('headerCounter').textContent = `${done} / ${total}`;
    }

    function toggleDone(id) {
      doneState[id] = !doneState[id];
      updateHeaderCounter();
    }

    function toggleInstructions(id) {
      const el = document.getElementById('instr-' + id);
      el.classList.toggle('open');
    }

    function removeExercise(id) {
      currentIds = currentIds.filter(e => e !== id);
      delete doneState[id];
      renderExercises();
      updateHeaderCounter();
    }

    function addExercise(id) {
      if (!currentIds.includes(id)) {
        currentIds.push(id);
        renderExercises();
        updateHeaderCounter();
      }
      document.getElementById('searchInput').value = '';
      document.getElementById('searchResults').classList.add('hidden');
    }

    function updateCarouselState(id) {
      const card = document.querySelector(`[data-exercise-id="${id}"]`);
      if (!card) return;
      const track = card.querySelector('.carousel-track');
      if (!track) return;
      const items = track.querySelectorAll('.carousel-item');
      const dots = card.querySelectorAll('.carousel-dot');
      const counter = document.getElementById(`counter-${id}`);
      const prevBtn = card.querySelector('.carousel-prev');
      const nextBtn = card.querySelector('.carousel-next');
      if (!items.length) return;

      const itemWidth = track.scrollWidth / items.length;
      const index = Math.round(track.scrollLeft / itemWidth);

      dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
      if (counter) counter.textContent = `${index + 1} / ${items.length}`;
      if (prevBtn) prevBtn.disabled = index <= 0;
      if (nextBtn) nextBtn.disabled = index >= items.length - 1;
    }

    function scrollCarousel(id, dir) {
      const card = document.querySelector(`[data-exercise-id="${id}"]`);
      if (!card) return;
      const track = card.querySelector('.carousel-track');
      if (!track) return;
      const itemWidth = track.querySelector('.carousel-item')?.offsetWidth || 0;
      if (!itemWidth) return;
      track.scrollBy({ left: dir * itemWidth, behavior: 'smooth' });
    }

    function scrollToCarousel(id, index) {
      const card = document.querySelector(`[data-exercise-id="${id}"]`);
      if (!card) return;
      const track = card.querySelector('.carousel-track');
      if (!track) return;
      const itemWidth = track.querySelector('.carousel-item')?.offsetWidth || 0;
      if (!itemWidth) return;
      track.scrollTo({ left: index * itemWidth, behavior: 'smooth' });
    }

    function initCarousels() {
      document.querySelectorAll('.carousel-track').forEach(track => {
        if (track.dataset.listenerInit) return;
        const id = track.closest('[data-exercise-id]')?.dataset.exerciseId;
        if (!id) return;
        track.addEventListener('scroll', function() {
          updateCarouselState(id);
        }, { passive: true });
        track.dataset.listenerInit = 'true';
        updateCarouselState(id);
      });
    }

    function renderSearchResults(query) {
      const container = document.getElementById('resultsList');
      const resultsEl = document.getElementById('searchResults');

      if (!query || query.length < 2) {
        resultsEl.classList.add('hidden');
        return;
      }

      const q = query.toLowerCase();
      const matches = exercisesDB.filter(ex =>
        ex.name.toLowerCase().includes(q) &&
        !currentIds.includes(ex.id)
      ).slice(0, 8);

      if (matches.length === 0) {
        resultsEl.classList.add('hidden');
        return;
      }

      resultsEl.classList.remove('hidden');
      container.innerHTML = matches.map(ex => `
        <div class="search-result-item">
          <div>
            <div class="search-result-name">${ex.name}</div>
            <div class="search-result-category">${ex.category} &middot; ${ex.equipment} &middot; ${ex.primary}</div>
          </div>
          <button class="btn-add-exercise" onclick="addExercise('${ex.id}')" data-od-id="btn-add-${ex.id}">Adicionar</button>
        </div>
      `).join('');
    }

    document.getElementById('searchInput').addEventListener('input', function() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => renderSearchResults(this.value), 250);
    });

    document.getElementById('btnClear').addEventListener('click', function() {
      if (currentIds.length === 0) return;
      if (confirm(`Desmarcar todos os exercícios de ${dayDisplay}?`)) {
        currentIds.forEach(id => { doneState[id] = false; });
        renderExercises();
      }
    });

    renderExercises();
  </script>
</body>
</html>
