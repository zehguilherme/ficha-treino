<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>DS — Buttons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root { --background:210 40% 98%; --foreground:222.2 84% 4.9%; --card:0 0% 100%; --secondary:210 40% 96.1%; --muted-foreground:215.4 16.3% 46.9%; --destructive:0 84.2% 60.2%; --border:214.3 31.8% 91.4%; --ring:222.2 84% 4.9%; --radius:0.5rem; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Inter,system-ui,sans-serif; background:hsl(var(--background)); color:hsl(var(--foreground)); padding:2rem; }
h1 { font-size:1.5rem; font-weight:600; letter-spacing:-0.02em; margin-bottom:0.25rem; }
.sub { font-size:0.875rem; color:hsl(var(--muted-foreground)); margin-bottom:2rem; }
.group { display:flex; flex-wrap:wrap; gap:0.75rem; align-items:center; padding:1.25rem; background:hsl(var(--card)); border:1px solid hsl(var(--border)); border-radius:calc(var(--radius)+0.125rem); margin-bottom:1rem; }
.label { font-size:0.75rem; font-weight:500; color:hsl(var(--muted-foreground)); letter-spacing:0.06em; text-transform:uppercase; width:100%; }
.btn { display:inline-flex;align-items:center;gap:0.375rem;font-size:0.8125rem;font-weight:500;letter-spacing:0.02em;text-transform:uppercase;border-radius:var(--radius);padding:0.375rem 0.75rem;cursor:default;transition:all 0.15s; }
.btn-icon { width:2rem;height:2rem;justify-content:center;border:1px solid hsl(var(--border));background:hsl(var(--card));color:hsl(var(--foreground));padding:0; }
.btn-destructive { color:white;background:hsl(var(--destructive));border:none; }
.btn-clear { color:hsl(var(--muted-foreground));background:none;border:1px solid hsl(var(--border)); }
.btn-solid { color:hsl(var(--card));background:hsl(var(--foreground));border:none; }
.btn-cancel { color:hsl(var(--foreground));background:hsl(var(--card));border:1px solid hsl(var(--border));padding:0.5rem 1rem; }
</style>
</head><body>
<h1>Button Variants</h1>
<p class="sub">All buttons: 0.8125rem / 500 / 0.02em / uppercase</p>
<div class="group"><div class="label">Icon (back)</div><div class="btn btn-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg></div></div>
<div class="group"><div class="label">Destructive (remove, delete)</div><div class="btn btn-destructive"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/></svg>Remover</div><div class="btn btn-destructive" style="padding:0.5rem 1rem"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/></svg>Excluir conta</div></div>
<div class="group"><div class="label">Clear (hover → destructive)</div><div class="btn btn-clear"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m16 22-1-4"/><path d="M19 14a1 1 0 0 0 1-1v-1a2 2 0 0 0-2-2h-3a1 1 0 0 1-1-1V4a2 2 0 0 0-4 0v5a1 1 0 0 1-1 1H6a2 2 0 0 0-2 2v1a1 1 0 0 0 1 1"/><path d="M19 14H5l-1.973 6.767A1 1 0 0 0 4 22h16a1 1 0 0 0 .973-1.233z"/><path d="M8 22 7 18"/></svg>Limpar treino</div></div>
<div class="group"><div class="label">Solid (add)</div><div class="btn btn-solid">Adicionar</div></div>
<div class="group"><div class="label">Cancel (modal)</div><div class="btn btn-cancel">Cancelar</div></div>
</body></html>
