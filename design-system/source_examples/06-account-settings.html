<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Source Example — Account Settings</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;font-family:'Inter',system-ui,sans-serif;background:hsl(var(--background));color:hsl(var(--foreground));min-height:100vh}
.snapshot-label{background:hsl(var(--primary));color:hsl(var(--primary-foreground));padding:0.5rem 1rem;font-size:0.75rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase}
.page{padding:1.5rem;max-width:40rem;margin:0 auto}

.profile-row-icon svg{width:1.125rem;height:1.125rem}
.profile-row-content{flex:1}
.profile-row-label{font-size:0.75rem;color:hsl(var(--muted-foreground));margin-bottom:0.125rem}
.profile-row-value{font-size:0.875rem;font-weight:500}
.danger-zone{padding:1.25rem;border-top:1px solid hsl(var(--destructive)/0.2);background:hsl(var(--destructive)/0.03)}
.danger-zone-title{font-size:0.8125rem;font-weight:600;color:hsl(var(--destructive));margin-bottom:0.5rem}
.btn-danger{font-size:0.75rem;font-weight:500;letter-spacing:0.02em;text-transform:uppercase;color:hsl(var(--destructive));background:none;border:1px solid hsl(var(--destructive)/0.3);border-radius:var(--radius);padding:0.375rem 0.75rem;cursor:pointer}

</style></head><body>

</div>
</div>
</div>
