<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Source Example — Hero Section</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;font-family:'Inter',system-ui,sans-serif;background:hsl(var(--background));color:hsl(var(--foreground));min-height:100vh}
.snapshot-label{position:sticky;top:0;z-index:100;background:hsl(var(--primary));color:hsl(var(--primary-foreground));padding:0.5rem 1rem;font-size:0.75rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase}
.header{background:hsl(var(--card));border-bottom:1px solid hsl(var(--border));position:sticky;top:0;z-index:50}
.header-inner{max-width:80rem;margin:0 auto;padding:0 1.5rem;height:3.5rem;display:flex;align-items:center;gap:0.75rem}
.header-logo{width:1.75rem;height:1.75rem;background:hsl(var(--foreground));border-radius:0.375rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header-logo svg{width:0.875rem;height:0.875rem;color:hsl(var(--background))}
.header-title{font-size:1rem;font-weight:600;letter-spacing:-0.01em}
.header-right{margin-left:auto;display:flex;align-items:center;gap:0.75rem}
.btn-login-header{font-size:0.8125rem;font-weight:500;letter-spacing:0.02em;color:hsl(var(--foreground));background:none;border:1px solid hsl(var(--border));border-radius:var(--radius);padding:0.375rem 0.75rem;cursor:pointer}
.btn-login-header:hover{background:hsl(var(--secondary))}
.hero{position:relative;min-height:85vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(0.35)}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,hsl(var(--foreground)/0.7)0%,hsl(var(--foreground)/0.85)100%)}
.hero-content{position:relative;z-index:10;text-align:center;max-width:44rem;padding:2rem 1.5rem}
.hero-eyebrow{font-size:0.75rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:hsl(var(--muted-foreground));margin-bottom:1rem}
.hero-headline{font-size:clamp(2.25rem,6vw,4rem);font-weight:800;letter-spacing:-0.03em;line-height:1.1;color:hsl(var(--background));margin-bottom:1.25rem}
.hero-headline em{font-style:normal;color:hsl(var(--primary-foreground)/0.8)}
.hero-subtitle{font-size:clamp(0.9375rem,2vw,1.125rem);color:hsl(var(--muted-foreground));line-height:1.7;max-width:36rem;margin:0 auto 2rem}
.hero-cta{display:inline-flex;align-items:center;gap:0.5rem;font-size:0.875rem;font-weight:600;letter-spacing:0.03em;text-transform:uppercase;color:hsl(var(--primary-foreground));background:hsl(var(--primary));border:none;border-radius:var(--radius);padding:0.75rem 2rem;cursor:pointer;transition:opacity 0.15s}
.hero-cta:hover{opacity:0.9}
.hero-cta svg{width:1.125rem;height:1.125rem}
</style></head><body>
<div class="snapshot-label">source_examples/01-hero-section.html — Landing page (landing.html)</div>
<header class="header"><div class="header-inner">
<div class="header-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5 17.5 17.5"/><path d="M17.5 6.5 6.5 17.5"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/><circle cx="5" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg></div>
<span class="header-title">Ficha de Treino</span>
<div class="header-right"><button class="btn-login-header">Entrar</button></div>
</div></header>
<section class="hero">
<div class="hero-content">
<p class="hero-eyebrow">Ficha de Treino</p>
<h1 class="hero-headline">Seu próximo shape<br><em>começa aqui</em></h1>
<p class="hero-subtitle">Organize seus treinos, acompanhe cada exercício e evolua com consistência. O planejamento que separa quem sonha de quem conquista.</p>
<button class="hero-cta">Começar agora<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></button>
</div>
</section>
</body></html>
