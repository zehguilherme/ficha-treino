<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Source Example — Workout Exercise List</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;font-family:'Inter',system-ui,sans-serif;background:hsl(var(--background));color:hsl(var(--foreground));min-height:100vh}
.snapshot-label{background:hsl(var(--primary));color:hsl(var(--primary-foreground));padding:0.5rem 1rem;font-size:0.75rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase}
.page{padding:1.5rem;max-width:48rem;margin:0 auto}
.header{background:hsl(var(--card));border-bottom:1px solid hsl(var(--border));position:sticky;top:0;z-index:50;padding:0.75rem 1.5rem;display:flex;align-items:center;gap:0.75rem}
.header svg{width:1.25rem;height:1.25rem;flex-shrink:0;cursor:pointer}
.header span{font-size:0.9375rem;font-weight:600}
.day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.day-header h1{font-size:1.25rem;font-weight:700;letter-spacing:-0.02em}
.btn-clear{display:inline-flex;align-items:center;gap:0.375rem;font-size:0.75rem;font-weight:500;letter-spacing:0.02em;text-transform:uppercase;color:hsl(var(--muted-foreground));background:none;border:1px solid hsl(var(--border));border-radius:var(--radius);padding:0.375rem 0.75rem;cursor:pointer}
.btn-clear svg{width:0.875rem;height:0.875rem}
.search-container{position:relative;margin-bottom:1.25rem}
.search-container input{width:100%;font-size:0.875rem;padding:0.5rem 1rem 0.5rem 2.25rem;border:1px solid hsl(var(--border));border-radius:var(--radius);background:hsl(var(--card));outline:none;color:hsl(var(--foreground))}
.search-container input:focus{border-color:hsl(var(--ring))}
.search-container svg{position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);width:0.875rem;height:0.875rem;color:hsl(var(--muted-foreground))}
.exercise-card{background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:calc(var(--radius)+0.125rem);padding:1rem;margin-bottom:0.75rem}
.exercise-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.5rem}
.exercise-card-title{font-size:0.9375rem;font-weight:600}
.exercise-tags{display:flex;gap:0.375rem;flex-wrap:wrap;margin-bottom:0.5rem}
.tag{font-size:0.6875rem;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:hsl(var(--muted-foreground));background:hsl(var(--secondary));padding:0.125rem 0.5rem;border-radius:9999px}
.muscle-label{font-size:0.75rem;color:hsl(var(--muted-foreground))}
.exercise-actions{display:flex;align-items:center;gap:0.75rem;margin-top:0.5rem;padding-top:0.5rem;border-top:1px solid hsl(var(--border))}
.btn-remove-exercise{display:inline-flex;align-items:center;gap:0.25rem;font-size:0.75rem;font-weight:500;color:hsl(var(--destructive));background:none;border:none;cursor:pointer;padding:0}
.btn-remove-exercise svg{width:0.875rem;height:0.875rem}
.instructions-toggle{display:inline-flex;align-items:center;gap:0.25rem;font-size:0.75rem;font-weight:500;color:hsl(var(--muted-foreground));background:none;border:none;cursor:pointer;margin-left:auto}
.instructions-toggle svg{width:0.625rem;height:0.625rem;transition:transform 0.2s}
</style></head><body>
<div class="snapshot-label">source_examples/05-workout-exercise-list.html — Workout Day (workout-day.html)</div>
<div class="header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg><span>Segunda-feira</span></div>
<div class="page">
<div class="day-header"><h1>Supino reto com barra</h1><button class="btn-clear"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/></svg>Limpar treino</button></div>
<div class="search-container"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" placeholder="Pesquisar exercício..."></div>
<div class="exercise-card">
<div class="exercise-card-header"><span class="exercise-card-title">Supino reto com barra</span></div>
<div class="exercise-tags"><span class="tag">força</span><span class="tag">barra</span></div>
<span class="muscle-label">💪 Peitoral maior</span>
<div class="exercise-actions">
<button class="btn-remove-exercise"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/></svg>Remover</button>
<button class="instructions-toggle">Instruções<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></button>
</div>
</div>
<div class="exercise-card">
<div class="exercise-card-header"><span class="exercise-card-title">Crucifixo com halteres</span></div>
<div class="exercise-tags"><span class="tag">força</span><span class="tag">halteres</span></div>
<span class="muscle-label">💪 Peitoral maior</span>
<div class="exercise-actions">
<button class="btn-remove-exercise"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/></svg>Remover</button>
<button class="instructions-toggle">Instruções<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></button>
</div>
</div>
</div>
</body></html>
