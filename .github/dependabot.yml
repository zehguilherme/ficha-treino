version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "daily"
    groups:
      next:
        patterns: ["next", "eslint-config-next"]
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*"]
      types:
        patterns: ["@types/*"]

  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "daily"
